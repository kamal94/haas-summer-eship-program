<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 72" width="380" height="72" fill="none">
  <style>
    .wm {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;
      font-size: 52px;
      letter-spacing: -0.03em;
    }
  </style>

  <!-- Slash mark -->
  <line x1="19" y1="5" x2="7" y2="67" stroke="#69d98e" stroke-width="11" stroke-linecap="round"/>

  <!-- Wordmark: haas (black) + ventures (regular) -->
  <text class="wm" y="56" fill="#111111">
    <tspan x="34" font-weight="900">haas</tspan><tspan font-weight="400">ventures</tspan>
  </text>
</svg>
